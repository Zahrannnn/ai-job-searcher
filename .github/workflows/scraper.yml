name: Job Monitor — Daily Frontend Scrape

on:
  schedule:
    # 06:00 UTC = 08:00 Cairo. Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write           # commit results back to repo
  issues: write             # create issues for new high-match jobs

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: job-monitor/requirements.txt

      - name: Install dependencies
        working-directory: job-monitor
        run: pip install -r requirements.txt

      - name: Run monitor
        working-directory: job-monitor
        run: python -m scraper.main

      - name: Read new count
        id: newcount
        working-directory: job-monitor
        run: |
          NEW_COUNT=$(cat data/new_count.txt)
          echo "new_count=${NEW_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue for new high-match jobs
        if: steps.newcount.outputs.new_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('job-monitor/data/jobs.json', 'utf8'));
            const top = (data.items || []).filter(i => (i.score || 0) >= 70).slice(0, 15);
            const count = parseInt('${{ steps.newcount.outputs.new_count }}', 10);
            const lines = [];
            lines.push(`## ${count} new high-match frontend job${count > 1 ? 's' : ''} found`);
            lines.push('');
            lines.push(`Top ${top.length} matches (score >= 70):`);
            lines.push('');
            for (const it of top) {
              const loc = it.location || '?';
              const age = it.age_days != null ? `${it.age_days}d ago` : '?';
              const skills = (it.skills || []).slice(0, 5).join(', ');
              lines.push(`### ${it.name} @ ${it.company}`);
              lines.push(`- **Score:** ${it.score}/100 — **${loc}** (${age})`);
              lines.push(`- **Source:** ${it.source}`);
              if (skills) lines.push(`- **Skills:** ${skills}`);
              lines.push(`- **Apply:** ${it.url}`);
              lines.push('');
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🆕 ${count} new frontend job${count > 1 ? 's' : ''} matching your filter (score ≥ 70)`,
              body: lines.join('\n'),
              labels: ['jobs', 'frontend'],
            });

      - name: Commit results back to repo
        run: |
          git config user.name "job-monitor-bot"
          git config user.email "job-monitor-bot@users.noreply.github.com"
          git add job-monitor/data/ || true
          git diff --cached --quiet || git commit -m "chore(job-monitor): daily scrape results"
          git push

      - name: Summary
        if: always()
        run: |
          if [ -f job-monitor/data/new_count.txt ]; then
            echo "### Job Monitor — Daily Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "New high-match items: $(cat job-monitor/data/new_count.txt)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Full report: \`job-monitor/data/latest_report.md\`" >> "$GITHUB_STEP_SUMMARY"
          fi
