# Job Monitor Configuration
# Customise filters, scoring, and storage. No code changes needed.

# Pre-filter rules (fast, before scoring)
filters:
  # Must contain at least ONE of these (case-insensitive)
  required_keywords:
    - react
    - next.js
    - nextjs
    - typescript
    - frontend
    - front-end
    - "front end"
    - javascript

  # Hard reject if item matches any of these
  blocked_keywords:
    - ios native
    - swift
    - kotlin
    - "android developer"
    - "android native"
    - "angular developer"   # pure Angular only
    - ".net developer"
    - "c# developer"
    - "php developer"
    - "laravel developer"
    - "ruby on rails"
    - wordpress
    - shopify
    - "machine learning"
    - "data scientist"
    - "data engineer"
    - "devops engineer"
    - "qa engineer"
    - "test automation"
    - "sdet"
    - "backend engineer"
    - "backend developer"

  # Must be in or accept one of these locations
  # "worldwide" / "anywhere" treated as remote OK
  location_keywords:
    - cairo
    - egypt
    - mena
    - riyadh
    - saudi
    - "united arab"
    - dubai
    - qatar
    - doha
    - jordan
    - amman
    - remote
    - "anywhere in the world"
    - "worldwide"

  # Max age in days
  max_age_days: 14

  # Min score to keep an item (0-100)
  min_score: 30

  # Min score to trigger a GitHub Issue alert
  alert_threshold: 70

# Source enable/disable
sources:
  wuzzuf: true          # Egypt/MENA (HTML) — primary, 22 items
  bayt: false           # Egypt/MENA (HTML) — Cloudflare 403s, disabled
  remotive: true        # Remote global (JSON API) — software-dev, ~12 items, 5+ pass
  jobicy: true          # Remote global (JSON API) — engineering industry, 20 items, 3+ pass
  arbeitnow: true       # Europe/Remote (JSON API) — German on-site heavy, low hit rate
  vuejobs: true         # Vue.js heavy, low hit rate
  remoteok: false       # API returns the same flat tag list per job, no real filter; recent 100 skew non-tech
  himalayas: true       # Remote global (JSON API) — geographic diversity, lower volume
  linkedin: true        # Public guest search (HTML), Egypt + Cairo + Remote, 20-25 fresh items

# Storage
storage:
  type: "json"
  data_path: "data/jobs.json"
  history_path: "data/jobs_history.json"   # append-only archive

# Scoring weights (tune to taste; all values are 0-100)
scoring:
  # Positive signals
  stack_match_react: 25
  stack_match_nextjs: 15
  stack_match_typescript: 10
  location_cairo_remote: 20
  posted_within_3_days: 15
  posted_4_to_7_days: 10
  ai_or_ml_mentioned: 10
  experience_3_to_5yr: 10
  founding_or_early_role: 10
  english_friendly_company: 5
  senior_ic_level: 5
  salary_disclosed_competitive: 5

  # Negative signals
  blocked_in_title: -50
  vuejs_only: -20
  angular_only: -30
  php_only: -25
  net_only: -25
  ios_or_android_only: -40
  internship_role: -30
  five_plus_years_required: -10
  us_only: -15
  eu_only: -10
  senior_management_level: -15

# Cron
schedule:
  # Cron expression in UTC
  # "0 6 * * *" = 6am UTC daily = 8am Cairo
  cron: "0 6 * * *"
  timezone: "UTC"
